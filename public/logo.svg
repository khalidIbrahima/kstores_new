<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="50%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#15803d"/>
    </linearGradient>
    <linearGradient id="dark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#060a13"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#22c55e" flood-opacity="0.3"/>
    </filter>
    <clipPath id="hexClip">
      <polygon points="256,20 462,138 462,374 256,492 50,374 50,138"/>
    </clipPath>
  </defs>

  <!-- Outer hexagon shell -->
  <polygon points="256,20 462,138 462,374 256,492 50,374 50,138" fill="url(#dark)" stroke="url(#glow)" stroke-width="6" filter="url(#shadow)"/>

  <!-- Inner circuit pattern lines -->
  <g stroke="#22c55e" stroke-width="1.5" opacity="0.15">
    <line x1="130" y1="160" x2="130" y2="352"/>
    <line x1="180" y1="120" x2="180" y2="392"/>
    <line x1="230" y1="80" x2="230" y2="432"/>
    <line x1="280" y1="80" x2="280" y2="432"/>
    <line x1="330" y1="120" x2="330" y2="392"/>
    <line x1="380" y1="160" x2="380" y2="352"/>
    <!-- Horizontal circuit traces -->
    <line x1="100" y1="220" x2="412" y2="220"/>
    <line x1="80" y1="256" x2="432" y2="256"/>
    <line x1="100" y1="292" x2="412" y2="292"/>
  </g>

  <!-- Circuit nodes -->
  <g fill="#22c55e" opacity="0.2">
    <circle cx="180" cy="220" r="4"/>
    <circle cx="330" cy="220" r="4"/>
    <circle cx="230" cy="292" r="4"/>
    <circle cx="280" cy="292" r="4"/>
    <circle cx="130" cy="256" r="4"/>
    <circle cx="380" cy="256" r="4"/>
  </g>

  <!-- Central K mark — bold, geometric -->
  <g transform="translate(256,240)" filter="url(#shadow)">
    <!-- K left vertical bar -->
    <rect x="-72" y="-88" width="28" height="176" rx="4" fill="url(#glow)"/>
    <!-- K upper diagonal -->
    <polygon points="-44,-88 -44,-40 32,-88" fill="url(#glow)"/>
    <!-- K lower diagonal -->
    <polygon points="-44,40 -44,88 32,88" fill="url(#glow)"/>
    <!-- Spark/bolt accent connecting diagonals -->
    <polygon points="-20,-12 12,-52 4,-8 28,32 -4,-4" fill="#ffffff" opacity="0.95"/>
  </g>

  <!-- Dot accent -->
  <circle cx="340" cy="296" r="10" fill="#22c55e" opacity="0.9"/>
  <circle cx="340" cy="296" r="5" fill="#ffffff" opacity="0.8"/>

  <!-- Subtle ring pulse -->
  <circle cx="256" cy="240" r="120" fill="none" stroke="#22c55e" stroke-width="1" opacity="0.08"/>
  <circle cx="256" cy="240" r="140" fill="none" stroke="#22c55e" stroke-width="0.5" opacity="0.05"/>
</svg>
